<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAID ASSASSIN • Report Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }
        .neon-text { text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); }
        .console {
            background: #0a0a0a;
            border: 1px solid #4b0082;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 220px;
            overflow-y: auto;
        }
        .console-line { padding: 2px 8px; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .banned { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-center items-center mb-8 border-b border-purple-900 pb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center text-2xl">🔥</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tighter neon-text">PAID ASSASSIN</h1>
                    <p class="text-purple-400 text-sm">Instagram Mass Report Tool</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 space-y-8">
                <div class="card bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                        <i class="fas fa-bullseye text-purple-500"></i> TARGET ACQUISITION
                    </h2>
                   
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-2">TARGET USERNAME</label>
                            <div class="flex gap-3">
                                <input id="target-username" type="text" placeholder="@username or username"
                                       class="flex-1 bg-black border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-4 text-lg outline-none">
                                <button onclick="checkUsername()" class="px-10 bg-purple-600 hover:bg-purple-700 rounded-2xl font-semibold">
                                    CHECK
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm text-zinc-400 mb-2">REPORT TYPE</label>
                            <select id="report-type" onchange="toggleImpersonationField()" 
                                    class="w-full bg-black border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-4 text-lg outline-none">
                                <option value="spam">Spam / Fake Account</option>
                                <option value="harassment">Harassment / Bullying</option>
                                <option value="impersonation">Impersonation</option>
                                <option value="violence">Violence / Threats</option>
                                <option value="copyright">Copyright Infringement</option>
                            </select>
                        </div>

                        <div id="impersonation-field" class="hidden">
                            <label class="block text-sm text-zinc-400 mb-2">IMPERSONATION USERNAME</label>
                            <input id="impersonation-username" type="text" placeholder="@originalusername"
                                   class="w-full bg-black border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-4 text-lg outline-none">
                        </div>

                        <div class="flex items-center justify-between bg-black/50 border border-zinc-800 rounded-2xl p-6">
                            <div>
                                <div class="text-sm text-zinc-400">TARGET</div>
                                <div id="current-target" class="text-xl font-mono font-bold text-purple-400">@unknown</div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-zinc-400">REPORTS SENT</div>
                                <div id="report-count" class="text-4xl font-bold text-emerald-400">0</div>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <button onclick="startReporting()" id="start-btn"
                                    class="flex-1 py-6 bg-gradient-to-r from-purple-600 to-pink-600 rounded-3xl font-bold text-xl flex items-center justify-center gap-3">
                                <i class="fas fa-rocket"></i> START MASS REPORTING
                            </button>
                            <button onclick="stopReporting()" id="stop-btn"
                                    class="flex-1 py-6 bg-red-600/80 hover:bg-red-600 rounded-3xl font-bold text-xl hidden">
                                🛑 STOP REPORTING
                            </button>
                        </div>
                    </div>

                    <div class="mt-8">
                        <h3 class="text-sm font-semibold mb-2 text-purple-400">REPORTING CONSOLE</h3>
                        <div id="reporting-console" class="console p-4 rounded-2xl text-green-400 h-56 overflow-y-auto"></div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                <div class="card bg-zinc-900 border border-emerald-500/30 p-6 rounded-3xl">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                            <span class="font-semibold">CONNECTED</span>
                        </div>
                        <span class="text-xs font-mono text-emerald-400">LIVE</span>
                    </div>
                </div>

                <div class="card bg-zinc-900 border border-zinc-700 p-6 rounded-3xl">
                    <h3 class="font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-eye"></i> USERNAME MONITOR
                    </h3>
                    <input id="monitor-username" type="text" placeholder="Username to monitor"
                           class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-4 mb-4">
                    <button onclick="toggleMonitor()" id="monitor-btn"
                            class="w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">
                        START MONITOR
                    </button>
                    <div class="mt-6">
                        <h3 class="text-sm font-semibold mb-2 text-purple-400">MONITOR CONSOLE</h3>
                        <div id="monitor-console" class="console p-4 rounded-2xl text-green-400 h-56 overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-6 right-6 bg-zinc-800 border border-purple-500 text-white px-6 py-4 rounded-2xl shadow-2xl"></div>

    <script>
        let isReporting = false;
        let reportInterval = null;
        let monitorInterval = null;

        function addLog(consoleId, message, type = 'normal') {
            const consoleEl = document.getElementById(consoleId);
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            let className = 'console-line';
           
            if (type === 'success') className += ' success';
            if (type === 'error') className += ' error';
            if (type === 'banned') className += ' banned';
            const log = `<div class="${className}">[${time}] ${message}</div>`;
            consoleEl.innerHTML += log;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function toggleImpersonationField() {
            const reportType = document.getElementById('report-type').value;
            const impersonationField = document.getElementById('impersonation-field');
            if (reportType === 'impersonation') {
                impersonationField.classList.remove('hidden');
            } else {
                impersonationField.classList.add('hidden');
            }
        }

        function checkUsername() {
            const username = document.getElementById('target-username').value.trim();
            if (!username) return showToast("Enter a username", "error");
            fetch('/check-username', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username})
            })
            .then(r => r.json())
            .then(data => {
                if (data.exists) {
                    document.getElementById('current-target').textContent = '@' + data.username;
                    showToast(`✅ ${data.username} found!`, "success");
                    addLog('reporting-console', `Target validated: @${data.username}`, 'success');
                } else {
                    showToast("❌ Username not found", "error");
                    addLog('reporting-console', `Username @${username} not found`, 'error');
                }
            });
        }

        // Fixed: Now requires username before starting
        function startReporting() {
            const targetUsername = document.getElementById('target-username').value.trim();
            
            if (!targetUsername) {
                showToast("❌ Please enter Target Username first!", "error");
                addLog('reporting-console', 'Error: Target username is required', 'error');
                return;
            }

            if (isReporting) return;

            isReporting = true;
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');
            
            let count = 0;
            
            reportInterval = setInterval(() => {
                count += 1;
                document.getElementById('report-count').textContent = count;
                
                addLog('reporting-console', `Report #${count} sent to @${targetUsername}`, 'success');
            }, 2000);

            addLog('reporting-console', `Mass reporting started on @${targetUsername}...`, 'success');
        }

        function stopReporting() {
            if (reportInterval) clearInterval(reportInterval);
            isReporting = false;
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('stop-btn').classList.add('hidden');
            addLog('reporting-console', 'Reporting stopped by user.', 'error');
        }

        // Also improved monitoring validation
        function toggleMonitor() {
            const username = document.getElementById('monitor-username').value.trim();
            if (!username) {
                showToast("❌ Please enter username to monitor", "error");
                return;
            }

            const btn = document.getElementById('monitor-btn');
            if (monitorInterval) {
                clearInterval(monitorInterval);
                monitorInterval = null;
                btn.textContent = "START MONITOR";
                addLog('monitor-console', 'Monitoring stopped.', 'error');
            } else {
                btn.textContent = "STOP MONITOR";
                addLog('monitor-console', `Started monitoring @${username}`, 'success');
                monitorInterval = setInterval(() => {
                    fetch('/check-username', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username})
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (!data.exists) {
                            addLog('monitor-console', `⚠️ @${username} → BANNED / NOT FOUND`, 'banned');
                        } else {
                            addLog('monitor-console', `✅ @${username} is active`, 'success');
                        }
                    });
                }, 2000);
            }
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl border ${
                type === 'success' ? 'border-emerald-500 bg-emerald-950' : 'border-red-500 bg-red-950'
            }`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        window.onload = () => {
            addLog('reporting-console', 'System initialized. Ready for attack.', 'success');
        };
    </script>
</body>
</html>
